<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>知人 · 干部信息管理系统</title>
<style>
  body{font-family:"Microsoft YaHei",sans-serif;margin:0;background:#f5f6f8;color:#222}
  .wrap{max-width:720px;margin:8vh auto;padding:0 24px;text-align:center}
  h1{font-size:28px;margin:0 0 8px}
  .sub{color:#666;margin-bottom:32px}
  .card{background:#fff;border-radius:12px;padding:32px;box-shadow:0 2px 12px rgba(0,0,0,.06);text-align:left}
  .badge{display:inline-block;background:#e8f0fe;color:#1a56db;border-radius:6px;padding:2px 10px;font-size:13px}
  code{background:#f0f0f0;padding:2px 6px;border-radius:4px}
  ul{line-height:1.9}
  #ie-warning{display:none;background:#b91c1c;color:#fff;padding:16px;text-align:center;font-size:16px}
</style>
</head>
<body>
<div id="ie-warning">
  检测到您正在使用 Internet Explorer，本系统不支持 IE。请改用 Chrome / Edge / 360 极速模式 打开。
</div>
<div class="wrap">
  <h1>知人 · 干部信息管理系统</h1>
  <div class="sub">骨架占位页 · 版本 <span id="ver">…</span></div>
  <div class="card">
    <p><span class="badge">运行中</span> 服务端已正常启动，发布链路（代码 → 安装包 → GitHub Release）已贯通。</p>
    <p>本页为占位首页，业务功能（干部档案、组合筛选、到龄提醒、备份等）将按 v1 计划逐步填入。</p>
    <ul>
      <li>健康检查：<code>/healthz</code></li>
      <li>版本接口：<code>/api/version</code></li>
    </ul>
  </div>
</div>
<script>
  // IE 检测兜底：万一有人用系统自带 IE 直接访问，给出明确提示而非白屏
  if (document.documentMode || /MSIE|Trident/.test(navigator.userAgent)) {
    document.getElementById('ie-warning').style.display = 'block';
  }
  fetch('/api/version').then(function (r) { return r.json(); }).then(function (d) {
    document.getElementById('ver').textContent = d.version;
  }).catch(function () {});
</script>
</body>
</html>
