name: release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.20'
      - name: 构建 Windows exe
        shell: bash
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o dist/zhiren.exe .
      - name: 安装 Inno Setup
        run: choco install innosetup --no-progress -y
      - name: 编译安装包
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$env:GITHUB_REF_NAME" installer\zhiren.iss
      - name: 发布到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/zhiren-setup-*.exe
          generate_release_notes: true
