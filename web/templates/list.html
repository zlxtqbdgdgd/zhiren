<h1>干部查询</h1>

<form method="get" action="/cadres" class="search">
  <div class="quick">
    <input name="q" value="{{.Q}}" placeholder="全局快查：姓名 / 职务 / 简历词条…（精准匹配，张锋≠张峰）" autofocus>
    <button type="submit">查询</button>
    <button type="submit" formaction="/export">导出结果</button>
  </div>
  <details {{if .Q}}{{else}}open{{end}}>
    <summary>高级组合筛选（多条件 AND，按字符精准包含）</summary>
    <div class="filter-grid">
      {{$f := .Filters}}
      {{range .Fields}}
        <label>{{.Label}}<input name="f_{{.Key}}" value="{{index $f .Key}}"></label>
      {{end}}
    </div>
  </details>
</form>

<p class="muted">共 {{.Count}} 条结果</p>
<table>
  <tr><th>姓名</th><th>性别</th><th>年龄</th><th>现任职务</th><th>编制类别</th><th>到龄时间</th><th>操作</th></tr>
  {{range .Results}}
  <tr>
    <td><a href="/cadres/view?id={{.Cadre.ID}}">{{.Cadre.F.name}}</a></td>
    <td>{{.Cadre.F.gender}}</td>
    <td>{{.Age}}</td>
    <td>{{.Cadre.F.current_pos}}</td>
    <td>{{.Cadre.F.establishment_cat}}</td>
    <td>{{.Retire}}</td>
    <td class="ops">
      <a href="/cadres/view?id={{.Cadre.ID}}">查看</a>
      {{if $.CanEdit}}
        <a href="/cadres/edit?id={{.Cadre.ID}}">编辑</a>
        <form method="post" action="/cadres/delete" onsubmit="return confirm('确认删除该干部记录？')">
          <input type="hidden" name="id" value="{{.Cadre.ID}}">
          <button type="submit" class="link danger">删除</button>
        </form>
      {{end}}
    </td>
  </tr>
  {{end}}
</table>
