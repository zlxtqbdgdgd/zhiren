<div class="page-head">
  <h1>到龄提醒</h1>
  <a class="btn primary" href="/reminders/export">导出名单（Excel/CSV）</a>
</div>
<p class="muted">范围：本月起 {{.Window}} 个月内到龄（对应“到龄前一个月及当月”提醒口径，可在系统管理中调整）。</p>

{{if .Due}}
<table>
  <tr><th>姓名</th><th>性别</th><th>年龄</th><th>现任职务</th><th>编制类别</th><th>到龄时间</th><th></th></tr>
  {{range .Due}}
  <tr>
    <td>{{.Cadre.F.name}}</td><td>{{.Cadre.F.gender}}</td><td>{{.Age}}</td>
    <td>{{.Cadre.F.current_pos}}</td><td>{{.Cadre.F.establishment_cat}}</td><td>{{.Retire}}</td>
    <td><a href="/cadres/view?id={{.Cadre.ID}}">查看</a></td>
  </tr>
  {{end}}
</table>
{{else}}<p>本期暂无到龄人员。</p>{{end}}
