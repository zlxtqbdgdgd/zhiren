<h1>批量维护</h1>
<p class="muted">用途：批量更新年度考核结果、公务员转正信息等。先筛人，勾选后统一设置某个字段。</p>

<form method="get" action="/batch" class="search">
  <div class="quick">
    <input name="q" value="{{.Q}}" placeholder="先筛选要批量处理的人员…">
    <button type="submit">筛选</button>
  </div>
</form>

<form method="post" action="/batch">
  <div class="batch-bar">
    <label>批量设置字段：
      <select name="key" required>
        <option value=""></option>
        {{range .BatchFields}}<option value="{{.Key}}">{{.Label}}</option>{{end}}
      </select>
    </label>
    <label>设为：<input name="value" placeholder="如：优秀 / 已转正 / 2025"></label>
    <button type="submit" class="btn primary" onclick="return confirm('确认对已勾选人员批量设置该字段？')">应用到勾选人员</button>
  </div>

  <table>
    <tr><th><input type="checkbox" onclick="var b=document.querySelectorAll('input[name=id]');for(var i=0;i<b.length;i++)b[i].checked=this.checked"></th>
        <th>姓名</th><th>性别</th><th>现任职务</th><th>年度考核情况</th></tr>
    {{range .Results}}
    <tr>
      <td><input type="checkbox" name="id" value="{{.Cadre.ID}}"></td>
      <td>{{.Cadre.F.name}}</td><td>{{.Cadre.F.gender}}</td>
      <td>{{.Cadre.F.current_pos}}</td><td>{{.Cadre.F.annual_assess}}</td>
    </tr>
    {{end}}
  </table>
</form>
